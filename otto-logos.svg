<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otto AI — Logo Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0a0a0b; color: #ececee; min-height: 100vh; }
  .header { text-align: center; padding: 60px 20px 40px; }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .header p { color: #888; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 32px; max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; }
  .card { background: #141416; border: 1px solid #27272b; border-radius: 20px; overflow: hidden; }
  .card-preview { padding: 48px; display: flex; align-items: center; justify-content: center; min-height: 220px; }
  .card-preview.dark { background: #0a0a0b; }
  .card-preview.light { background: #f8f8fa; }
  .card-info { padding: 20px 24px; border-top: 1px solid #27272b; }
  .card-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-info p { font-size: 12px; color: #888; }
  .row { display: flex; gap: 48px; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="header">
  <h1>Otto AI — Logo Concepts</h1>
  <p>Minimal & modern · Indigo accent #6366f1</p>
</div>

<div class="grid">

  <!-- CONCEPT 1: Geometric O with neural dot -->
  <div class="card">
    <div class="card-preview dark">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="16" fill="#6366f1"/>
          <circle cx="32" cy="32" r="16" stroke="white" stroke-width="3.5" fill="none"/>
          <circle cx="32" cy="32" r="4.5" fill="white"/>
        </svg>
        <svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="#ececee" letter-spacing="-1">otto</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 1 — Neural Eye</h3>
      <p>Rounded square icon with concentric O + center dot. AI "eye" symbolism. Clean wordmark.</p>
    </div>
  </div>

  <!-- CONCEPT 2: Stacked rings -->
  <div class="card">
    <div class="card-preview dark">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="#6366f1" stroke-width="3" fill="none"/>
          <circle cx="32" cy="32" r="19" stroke="#6366f1" stroke-width="2.5" fill="none" opacity="0.6"/>
          <circle cx="32" cy="32" r="9" fill="#6366f1"/>
        </svg>
        <svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="#ececee" letter-spacing="-1">otto</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 2 — Ripple</h3>
      <p>Three concentric circles with fading opacity. Suggests expansion, reach, signal.</p>
    </div>
  </div>

  <!-- CONCEPT 3: Abstract O with gradient -->
  <div class="card">
    <div class="card-preview dark">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="16" fill="url(#grad1)"/>
          <path d="M32 14C22.059 14 14 22.059 14 32s8.059 18 18 18 18-8.059 18-18S41.941 14 32 14zm0 28.5c-5.799 0-10.5-4.701-10.5-10.5S26.201 21.5 32 21.5 42.5 26.201 42.5 32 37.799 42.5 32 42.5z" fill="white"/>
        </svg>
        <svg width="160" height="44" viewBox="0 0 160 44" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="tgrad1" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#ececee"/>
            </linearGradient>
          </defs>
          <text x="0" y="34" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="url(#tgrad1)" letter-spacing="-1">otto</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 3 — Gradient Mark</h3>
      <p>Bold O cutout on gradient square. Gradient wordmark from indigo to white. Premium feel.</p>
    </div>
  </div>

  <!-- CONCEPT 4: Two Os connected -->
  <div class="card">
    <div class="card-preview dark">
      <div class="row">
        <svg width="80" height="64" viewBox="0 0 80 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="32" r="18" stroke="#6366f1" stroke-width="3" fill="none"/>
          <circle cx="54" cy="32" r="18" stroke="#6366f1" stroke-width="3" fill="none"/>
          <line x1="44" y1="32" x2="36" y2="32" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <svg width="100" height="40" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="#ececee" letter-spacing="-1">tto</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 4 — Twin Link</h3>
      <p>The two O's of "otto" visualized as linked circles. Connection between business and AI.</p>
    </div>
  </div>

  <!-- CONCEPT 5: Monogram in square -->
  <div class="card">
    <div class="card-preview dark">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="60" height="60" rx="14" stroke="#6366f1" stroke-width="2.5" fill="none"/>
          <text x="32" y="42" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="32" font-weight="700" fill="#6366f1" letter-spacing="-2">O</text>
        </svg>
        <svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="600" fill="#ececee" letter-spacing="3">OTTO</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 5 — Monogram</h3>
      <p>Single "O" in rounded square frame. All-caps spaced wordmark. Corporate-minimal.</p>
    </div>
  </div>

  <!-- CONCEPT 6: Abstract brain/circuit O -->
  <div class="card">
    <div class="card-preview dark">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad2" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="24" stroke="url(#grad2)" stroke-width="3" fill="none"/>
          <!-- circuit nodes -->
          <circle cx="32" cy="8" r="3" fill="#6366f1"/>
          <circle cx="32" cy="56" r="3" fill="#a78bfa"/>
          <circle cx="8" cy="32" r="3" fill="#818cf8"/>
          <circle cx="56" cy="32" r="3" fill="#818cf8"/>
          <!-- inner connections -->
          <line x1="32" y1="11" x2="32" y2="24" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="40" x2="32" y2="53" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
          <line x1="11" y1="32" x2="24" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <line x1="40" y1="32" x2="53" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="8" fill="#6366f1"/>
          <circle cx="32" cy="32" r="3" fill="white"/>
        </svg>
        <svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="#ececee" letter-spacing="-1">otto</text>
          <text x="74" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="500" fill="#6366f1" letter-spacing="1.5">AI</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 6 — Circuit Node</h3>
      <p>O as a network hub with 4 connection points. AI brain/network metaphor. "AI" badge on wordmark.</p>
    </div>
  </div>

  <!-- LIGHT BACKGROUND VERSIONS -->
  <div class="card">
    <div class="card-preview light">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="16" fill="#6366f1"/>
          <circle cx="32" cy="32" r="16" stroke="white" stroke-width="3.5" fill="none"/>
          <circle cx="32" cy="32" r="4.5" fill="white"/>
        </svg>
        <svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="#18181b" letter-spacing="-1">otto</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 1 — Light mode</h3>
      <p>Same Neural Eye on white background. Dark wordmark. Works for website, docs, invoices.</p>
    </div>
  </div>

  <div class="card">
    <div class="card-preview light">
      <div class="row">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad3" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="24" stroke="url(#grad3)" stroke-width="3" fill="none"/>
          <circle cx="32" cy="8" r="3" fill="#6366f1"/>
          <circle cx="32" cy="56" r="3" fill="#a78bfa"/>
          <circle cx="8" cy="32" r="3" fill="#818cf8"/>
          <circle cx="56" cy="32" r="3" fill="#818cf8"/>
          <line x1="32" y1="11" x2="32" y2="24" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="40" x2="32" y2="53" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
          <line x1="11" y1="32" x2="24" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <line x1="40" y1="32" x2="53" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="8" fill="#6366f1"/>
          <circle cx="32" cy="32" r="3" fill="white"/>
        </svg>
        <svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="32" font-family="DM Sans, sans-serif" font-size="34" font-weight="700" fill="#18181b" letter-spacing="-1">otto</text>
          <text x="74" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="500" fill="#6366f1" letter-spacing="1.5">AI</text>
        </svg>
      </div>
    </div>
    <div class="card-info">
      <h3>Concept 6 — Light mode</h3>
      <p>Circuit Node on white. The strongest concept for AI positioning.</p>
    </div>
  </div>

</div>

</body>
</html>
